services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: ai-agent-server
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped    
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: ai-agent-client
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://server:8000
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped